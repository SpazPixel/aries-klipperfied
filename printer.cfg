[bed_screws]
screw1: 100,180
screw1_name: back center
# Screw 2 & 3 are your actual physical adjustment screws
screw2: 20,20
screw2_name: front left
screw3: 180,20
screw3_name: front right


[stepper_x]
step_pin: PB8
dir_pin: PB7
enable_pin: !PC13
microsteps: 16
rotation_distance: 34
endstop_pin: !PC15
position_endstop: 205.5
position_max: 205.5
homing_speed: 100
second_homing_speed: 5

[stepper_y]
step_pin: PB6
dir_pin: PB5
enable_pin: !PC13
microsteps: 16
rotation_distance: 34
endstop_pin: !PA6
position_max: 205.5
position_endstop: 205.5
homing_speed: 100
second_homing_speed: 5

[stepper_z]
step_pin: PB4
dir_pin: PB3 
enable_pin: !PC13
microsteps: 16
rotation_distance: 8
endstop_pin: !PA7
#position_endstop: 215
position_max: 216.5
position_min: -2.0
homing_speed: 25
second_homing_speed: 5

[extruder]
step_pin: PC14
dir_pin: PB9
enable_pin: !PC13
microsteps: 16
rotation_distance: 32.5
nozzle_diameter: 0.400
filament_diameter: 1.75
heater_pin: PA1
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA4
control: pid
pid_Kp: 29.460
pid_Ki: 2.067
pid_Kd: 104.952
min_temp: 0
max_temp: 250
min_extrude_temp: 150

[heater_bed]
heater_pin: PA2
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA5
inline_resistor: 100
control: pid
pid_Kp: 57.069
pid_Ki: 1.469
pid_Kd: 554.286
min_temp: 0
max_temp: 110

[fan]
pin: PC2

[heater_fan heatbreak_cooling_fan]
pin: PC3
heater: extruder
fan_speed: 0.45

[led extruder_led]
white_pin: PC1

[filament_switch_sensor runout_sensor]
pause_on_runout: True
debounce_delay: 1
switch_pin: PC0

[controller_fan mcu_fan1]
# unused fan FAN1 pin is PA0
pin: PA3
max_power: 1
fan_speed: 0.5
stepper: stepper_x, stepper_y, stepper_z
heater: heater_bed, extruder

[mcu]
serial: /dev/serial0
baud: 250000
restart_method: command

[printer]
kinematics: cartesian
max_velocity: 1200
max_accel: 7000
max_z_velocity: 30
max_z_accel: 100

[virtual_sdcard]
path: ~/printer_data/gcodes

[pause_resume]

[display_status]

[gcode_macro PAUSE]
rename_existing: BASE_PAUSE
gcode:
    {% set X = params.X|default(20)|float %}
    {% set Y = params.Y|default(20)|float %}
    {% set Z = params.Z|default(10)|float %}
    SAVE_GCODE_STATE NAME=PAUSE_state
    BASE_PAUSE
    G91
    G1 E-1.7 F2100
    G1 Z{Z}
    G90
    G1 X{X} Y{Y} F6000

[gcode_macro RESUME]
rename_existing: BASE_RESUME
gcode:
    G91
    G1 E1.7 F2100
    G90
    RESTORE_GCODE_STATE NAME=PAUSE_state MOVE=1
    BASE_RESUME

[gcode_macro CANCEL_PRINT]
rename_existing: BASE_CANCEL_PRINT
gcode:
    TURN_OFF_HEATERS
    CLEAR_PAUSE
    SDCARD_RESET_FILE
    BASE_CANCEL_PRINT

[gcode_macro PRINT_START]
gcode:
    {% set TARGET_EXTRUDER = params.EXTRUDER|default(200)|float %}
    {% set TARGET_BED = params.BED|default(60)|float %}
    {% set EXCLUDE_OBJECT_START = params.EXCLUDE_OBJECT_START|default(0) %}
    {% set EXCLUDE_OBJECT_DEFINE = params.EXCLUDE_OBJECT_DEFINE|default(0) %}
    G28
    M190 S{TARGET_BED}
    M109 S{TARGET_EXTRUDER}
    G92 E0
    G1 Z0.2
    G1 X100 E20 F1500
    G92 E0

[gcode_macro PRINT_END]
gcode:
    G28
    M190 S0
    M109 S0


